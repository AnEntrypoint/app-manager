<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #e0e0e0; }
    .container { display: flex; height: 100vh; flex-direction: column; }
    .header { background: #252526; padding: 12px 16px; border-bottom: 1px solid #3e3e42; display: flex; gap: 12px; align-items: center; }
    .header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    .button { background: #0e639c; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .button:hover { background: #1177bb; }
    .button.danger { background: #f48771; }
    .button.danger:hover { background: #ff6b6b; }
    .main { flex: 1; overflow-y: auto; padding: 16px; }
    .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .app-card { background: #252526; border: 1px solid #3e3e42; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s; }
    .app-card:hover { border-color: #0e639c; box-shadow: 0 0 12px rgba(14, 99, 156, 0.3); }
    .app-header { padding: 16px; border-bottom: 1px solid #3e3e42; display: flex; align-items: center; gap: 12px; }
    .app-icon { font-size: 32px; }
    .app-title { flex: 1; }
    .app-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .app-id { font-size: 11px; color: #858585; }
    .app-badge { background: #0e639c; color: white; padding: 2px 6px; border-radius: 2px; font-size: 10px; }
    .app-content { padding: 12px 16px; flex: 1; }
    .app-desc { font-size: 12px; color: #858585; margin-bottom: 12px; line-height: 1.4; }
    .app-meta { display: flex; gap: 12px; font-size: 11px; color: #858585; margin-bottom: 12px; }
    .app-actions { padding: 12px 16px; border-top: 1px solid #3e3e42; display: flex; gap: 6px; flex-wrap: wrap; }
    .button-sm { background: #0e639c; color: white; border: none; padding: 4px 8px; border-radius: 2px; cursor: pointer; font-size: 11px; flex: 1; min-width: 60px; }
    .button-sm:hover { background: #1177bb; }
    .button-sm.secondary { background: #3e3e42; }
    .button-sm.secondary:hover { background: #4e4e54; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-content { background: #252526; border: 1px solid #3e3e42; border-radius: 6px; padding: 20px; max-width: 500px; width: 90%; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; margin-bottom: 6px; color: #858585; }
    .form-input { width: 100%; background: #3e3e42; border: 1px solid #555; color: #e0e0e0; padding: 6px 8px; border-radius: 3px; font-size: 12px; }
    .form-input:focus { outline: none; border-color: #0e639c; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .form-actions button { padding: 6px 12px; border-radius: 3px; border: none; cursor: pointer; font-size: 12px; }
    .empty { text-align: center; padding: 40px; color: #858585; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .tabs { display: flex; border-bottom: 1px solid #3e3e42; background: #252526; padding: 0 16px; }
    .tab { padding: 8px 12px; font-size: 12px; cursor: pointer; color: #858585; background: transparent; border: none; border-bottom: 2px solid transparent; }
    .tab.active { color: #e0e0e0; border-bottom-color: #0e639c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 App Manager</h1>
      <button class="button" onclick="openCreateModal()">+ Create App</button>
      <button class="button" onclick="refreshApps()">🔄 Refresh</button>
    </div>

    <div style="background: #252526; border-bottom: 1px solid #3e3e42;">
      <div style="display: flex; padding: 0 16px;">
        <button class="tab active" onclick="switchTab('user')">👤 My Apps</button>
        <button class="tab" onclick="switchTab('builtin')">🏗️ Built-in Apps</button>
      </div>
    </div>

    <div class="main">
      <div id="userAppsTab">
        <div id="userAppsList" class="apps-grid"></div>
      </div>
      <div id="builtinAppsTab" style="display: none;">
        <div id="builtinAppsList" class="apps-grid"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="createModal">
    <div class="modal-content">
      <div class="modal-title">Create New App</div>
      <form onsubmit="submitCreate(event)">
        <div class="form-group">
          <label class="form-label">App ID *</label>
          <input class="form-input" id="createId" placeholder="app-my-app" required />
        </div>
        <div class="form-group">
          <label class="form-label">App Name *</label>
          <input class="form-input" id="createName" placeholder="My App" required />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input class="form-input" id="createDesc" placeholder="What does your app do?" />
        </div>
        <div class="form-group">
          <label class="form-label">Icon</label>
          <input class="form-input" id="createIcon" placeholder="🚀" value="📦" />
        </div>
        <div class="form-group">
          <label class="form-label">Template</label>
          <select class="form-input" id="createTemplate">
            <option value="blank">Blank</option>
            <option value="dashboard">Dashboard</option>
            <option value="task-explorer">Task Explorer</option>
            <option value="flow-viz">Flow Visualizer</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="button-sm secondary" onclick="closeCreateModal()">Cancel</button>
          <button type="submit" class="button-sm">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let userApps = [];
    let builtinApps = [];
    let allApps = [];

    async function initManager() {
      await refreshApps();
    }

    async function refreshApps() {
      try {
        const resp = await fetch('/api/apps');
        if (resp.ok) {
          const json = await resp.json();
          allApps = Array.isArray(json.data) ? json.data : (json.data?.apps || json.apps || []);
          userApps = allApps.filter(a => !a.builtin);
          builtinApps = allApps.filter(a => a.builtin);
          renderApps();
        }
      } catch (e) {
        console.error('Failed to load apps:', e);
      }
    }

    function renderApps() {
      document.getElementById('userAppsList').innerHTML = userApps.length ? renderAppCards(userApps) : '<div class="empty"><div class="empty-icon">📭</div>No apps yet. Create one!</div>';
      document.getElementById('builtinAppsList').innerHTML = renderAppCards(builtinApps);
    }

    function renderAppCards(apps) {
      return apps.map(app => `
        <div class="app-card">
          <div class="app-header">
            <div class="app-icon">${app.icon || '📦'}</div>
            <div class="app-title">
              <div class="app-name">${app.name}</div>
              <div class="app-id">${app.id}</div>
            </div>
            ${app.builtin ? '<div class="app-badge">Built-in</div>' : ''}
          </div>
          <div class="app-content">
            <div class="app-desc">${app.description || 'No description'}</div>
            <div class="app-meta">
              <span>v${app.version || '1.0.0'}</span>
              ${app.builtin ? '' : '<span>👤 User</span>'}
            </div>
          </div>
          <div class="app-actions">
            <button class="button-sm" onclick="runApp('${app.id}')">▶️ Run</button>
            <button class="button-sm" onclick="editApp('${app.id}')">✏️ Edit</button>
            ${!app.builtin ? `<button class="button-sm button-sm.secondary" onclick="deleteApp('${app.id}')">🗑️</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('[id$="AppsTab"]').forEach(t => t.style.display = 'none');
      event.target.classList.add('active');
      document.getElementById(tab + 'AppsTab').style.display = 'block';
    }

    function openCreateModal() {
      document.getElementById('createModal').classList.add('show');
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('show');
    }

    async function submitCreate(e) {
      e.preventDefault();
      const appId = document.getElementById('createId').value;
      const appName = document.getElementById('createName').value;
      const appDesc = document.getElementById('createDesc').value;
      const appIcon = document.getElementById('createIcon').value;
      const template = document.getElementById('createTemplate').value;

      try {
        const resp = await fetch('/api/user-apps', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: appId, name: appName, description: appDesc, icon: appIcon, template })
        });
        if (resp.ok) {
          closeCreateModal();
          await refreshApps();
          alert(`App "${appName}" created successfully!`);
        } else {
          const err = await resp.json();
          alert('Error: ' + (err.error || 'Failed to create app'));
        }
      } catch (e) {
        alert('Failed to create app: ' + e.message);
      }
    }

    async function runApp(appId) {
      window.open(`/apps/${appId}/dist/index.html`, '_blank');
    }

    function editApp(appId) {
      alert('Edit app coming soon - use App Editor');
    }

    async function deleteApp(appId) {
      if (!confirm('Delete this app? This cannot be undone.')) return;
      try {
        const resp = await fetch(`/api/user-apps/${appId}`, { method: 'DELETE' });
        if (resp.ok) {
          await refreshApps();
          alert('App deleted');
        }
      } catch (e) {
        alert('Delete failed: ' + e.message);
      }
    }

    initManager();
  </script>
</body>
</html>
